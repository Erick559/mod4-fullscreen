<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no viewport-fit=cover">
    <title>mod4_v1</title>
    <style>
        html, body, #SBContentWrapper {
            margin: 0;
            padding: 0;
            font-family: Helvetica, Arial, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            position: absolute;
            left: 0px;
            top: 0px;
            bottom: 0;
            right: 0;
        }

        @media only screen and (max-width: 650px) {
            #SBContentWrapper {
                width: 100% !important;
                height: 100% !important;
                top: 0 !important;
                left: 0 !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            #SBContentWrapper:fullscreen {
                overflow: hidden;
                width: 100% !important;
                height: 100% !important;
                background: #000;
            }

            #SBContentWrapper:fullscreen iframe {
                width: 100% !important;
                height: 100% !important;
                object-fit: contain;
                transform: none !important;
                position: relative;
                margin: 0 auto;
            }

            @media (orientation: portrait) {
                #SBContentWrapper:fullscreen iframe {
                    width: 100% !important;
                    height: auto !important;
                    min-height: 100%;
                }
            }

            @media (orientation: landscape) {
                #SBContentWrapper:fullscreen iframe {
                    height: 100% !important;
                    width: auto !important;
                    min-width: 100%;
                }
            }
        }
    </style>
</head>
<body>
<div id="SBContentWrapper" style="overflow: hidden;"></div>
<script>
    const isAndroid = /android/i.test(navigator.userAgent);

    function toggleFullscreen(element) {
        if (!document.fullscreenElement &&
            !document.mozFullScreenElement &&
            !document.webkitFullscreenElement &&
            !document.msFullscreenElement) {
            if (element.requestFullscreen) {
                element.requestFullscreen();
            } else if (element.mozRequestFullScreen) {
                element.mozRequestFullScreen();
            } else if (element.webkitRequestFullscreen) {
                element.webkitRequestFullscreen();
            } else if (element.msRequestFullscreen) {
                element.msRequestFullscreen();
            }
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.mozCancelFullScreen) {
                document.mozCancelFullScreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            }
        }
    }

    // function handleResize() {
    //     const wrapper = document.getElementById('SBContentWrapper');
    //     if (wrapper && document.fullscreenElement && isAndroid) {
    //         const iframe = wrapper.querySelector('iframe');
    //         if (iframe) {
    //             if(window.innerHeight > window.innerWidth) {
    //                 iframe.style.width = '100%';
    //                 iframe.style.height = 'auto';
    //             } else {
    //                 iframe.style.height = '100%';
    //                 iframe.style.width = 'auto';
    //             }
    //         }
    //     }
    // }

    // window.addEventListener('resize', handleResize);
    // window.addEventListener('orientationchange', handleResize);

    window.addEventListener('message', function(event) {
        if (event.data === 'fullscreen') {
            const wrapper = document.getElementById('SBContentWrapper');
            if (wrapper) {
                toggleFullscreen(wrapper);
            }
        }
    });
</script>
<script src="sb-init.js?bust=1.0.0.202404300805_1739863231074" 
        data-wrapper-id="SBContentWrapper" 
        data-config='{ "scaleMobile": 1,"scaleDesktop": 1}'></script>
</body>
</html>
