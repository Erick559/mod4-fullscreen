<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no viewport-fit=cover">
    <title>mod4_v1</title>
    <style>
        html, body, #SBContentWrapper {
            margin: 0;
            padding: 0;
            font-family: Helvetica, Arial, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            position: absolute;
            left: 0px;
            top: 0px;
            bottom: 0;
            right: 0;
        }

        @media only screen and (max-width: 650px) {
            #SBContentWrapper {
                width: 100% !important;
                height: 100% !important;
                top: 0 !important;
                left: 0 !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            #SBContentWrapper:fullscreen iframe {
                width: 100vh !important;
                height: 100vw !important;
                transform: scale(5); /* Override any scaling */
                object-fit: cover !important;
            }
        }
    </style>
</head>
<body>
<div id="SBContentWrapper" style="overflow: hidden;"></div>
<script>
    function toggleFullscreen(element) {
        if (!document.fullscreenElement &&
            !document.mozFullScreenElement &&
            !document.webkitFullscreenElement &&
            !document.msFullscreenElement) {
            // Entering fullscreen
            if (element.requestFullscreen) {
                element.requestFullscreen();
            } else if (element.mozRequestFullScreen) {
                element.mozRequestFullScreen();
            } else if (element.webkitRequestFullscreen) {
                element.webkitRequestFullscreen();
            } else if (element.msRequestFullscreen) {
                element.msRequestFullscreen();
            }
        } else {
            // Exiting fullscreen
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.mozCancelFullScreen) {
                document.mozCancelFullScreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen();
            }
        }
    }

    function adjustFullscreenHeight() {
        const wrapper = document.getElementById('SB4Content');
        const sbWrapper = document.getElementById('SBContentWrapper');
        if (document.fullscreenElement) {
            sbWrapper.style.height = `${window.outerHeight}px`;
            sbWrapper.style.width = `${window.outerWidth}px`;

            wrapper.style.height = `${window.outerHeight}px`;
            wrapper.style.width = `${window.outerWidth}px`;
        }
    }

    document.addEventListener('fullscreenchange', adjustFullscreenHeight);
    document.addEventListener('webkitfullscreenchange', adjustFullscreenHeight);
    document.addEventListener('mozfullscreenchange', adjustFullscreenHeight);

    window.addEventListener('message', function(event) {
        if (event.data === 'fullscreen') {
            const wrapper = document.getElementById('SBContentWrapper');
            if (wrapper) {
                toggleFullscreen(wrapper);
            }
        }
    });
</script>
<script src="sb-init.js?bust=1.0.0.202404300805_1739863231074" data-wrapper-id="SBContentWrapper" data-config='{ "scaleMobile": 1,"scaleDesktop": 1}'></script>
</body>
</html>
